<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#1e293b">
    <title>Assistant</title>
    <link rel="manifest" href="manifest.json">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #0f172a;
            color: #e2e8f0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .header {
            padding: 1rem;
            text-align: center;
            border-bottom: 1px solid #1e293b;
        }
        .header h1 { font-size: 1.2rem; font-weight: 500; }
        .status { font-size: 0.8rem; color: #64748b; margin-top: 0.25rem; }
        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 1rem;
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }
        .message {
            max-width: 85%;
            padding: 0.75rem 1rem;
            border-radius: 12px;
            font-size: 0.95rem;
            line-height: 1.5;
            white-space: pre-wrap;
        }
        .message.user {
            align-self: flex-end;
            background: #2563eb;
            color: white;
            border-bottom-right-radius: 4px;
        }
        .message.assistant {
            align-self: flex-start;
            background: #1e293b;
            border-bottom-left-radius: 4px;
        }
        .message.system {
            align-self: center;
            background: transparent;
            color: #64748b;
            font-size: 0.8rem;
            text-align: center;
        }
        .controls {
            padding: 1.5rem;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 1rem;
            border-top: 1px solid #1e293b;
        }
        .record-btn {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            border: 3px solid #2563eb;
            background: transparent;
            color: #2563eb;
            font-size: 2rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            -webkit-tap-highlight-color: transparent;
        }
        .record-btn:active, .record-btn.recording {
            background: #dc2626;
            border-color: #dc2626;
            color: white;
            transform: scale(1.1);
        }
        .record-btn.recording {
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse {
            0%, 100% { box-shadow: 0 0 0 0 rgba(220, 38, 38, 0.4); }
            50% { box-shadow: 0 0 0 15px rgba(220, 38, 38, 0); }
        }
        .timer {
            font-size: 0.9rem;
            color: #64748b;
            min-width: 50px;
            text-align: center;
        }
        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid #64748b;
            border-top-color: #2563eb;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="header">
        <h1>Assistant</h1>
        <div class="status" id="status">Ready</div>
    </div>

    <div class="messages" id="messages">
        <div class="message system">Hold the button to record voice message</div>
    </div>

    <div class="controls">
        <div class="timer" id="timer"></div>
        <button class="record-btn" id="recordBtn">&#127908;</button>
        <div class="timer" id="size"></div>
    </div>

    <script>
        const API_URL = window.location.origin;
        let mediaRecorder = null;
        let audioChunks = [];
        let startTime = null;
        let timerInterval = null;

        const recordBtn = document.getElementById('recordBtn');
        const statusEl = document.getElementById('status');
        const timerEl = document.getElementById('timer');
        const sizeEl = document.getElementById('size');
        const messagesEl = document.getElementById('messages');

        function addMessage(text, type) {
            const div = document.createElement('div');
            div.className = `message ${type}`;
            div.textContent = text;
            messagesEl.appendChild(div);
            messagesEl.scrollTop = messagesEl.scrollHeight;
            return div;
        }

        function updateTimer() {
            if (!startTime) return;
            const elapsed = Math.floor((Date.now() - startTime) / 1000);
            const mins = Math.floor(elapsed / 60);
            const secs = elapsed % 60;
            timerEl.textContent = `${mins}:${secs.toString().padStart(2, '0')}`;
        }

        async function startRecording() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                mediaRecorder = new MediaRecorder(stream, { mimeType: 'audio/webm;codecs=opus' });
                audioChunks = [];

                mediaRecorder.ondataavailable = (e) => {
                    if (e.data.size > 0) audioChunks.push(e.data);
                };

                mediaRecorder.onstop = async () => {
                    stream.getTracks().forEach(t => t.stop());
                    const blob = new Blob(audioChunks, { type: 'audio/webm' });
                    await sendAudio(blob);
                };

                mediaRecorder.start(100);
                startTime = Date.now();
                timerInterval = setInterval(updateTimer, 1000);
                recordBtn.classList.add('recording');
                statusEl.textContent = 'Recording...';
            } catch (err) {
                statusEl.textContent = 'Microphone access denied';
            }
        }

        function stopRecording() {
            if (mediaRecorder && mediaRecorder.state === 'recording') {
                mediaRecorder.stop();
                clearInterval(timerInterval);
                timerEl.textContent = '';
                recordBtn.classList.remove('recording');
                statusEl.textContent = 'Processing...';
            }
        }

        async function sendAudio(blob) {
            const sizeKb = Math.round(blob.size / 1024);
            sizeEl.textContent = `${sizeKb}KB`;
            addMessage(`[voice ${sizeKb}KB]`, 'user');

            const loadingMsg = addMessage('', 'assistant');
            loadingMsg.innerHTML = '<div class="loading"></div> Thinking...';

            try {
                const formData = new FormData();
                formData.append('audio', blob, 'voice.webm');

                const response = await fetch(`${API_URL}/api/voice`, {
                    method: 'POST',
                    body: formData,
                });

                if (!response.ok) throw new Error(`HTTP ${response.status}`);

                const data = await response.json();

                // Show transcription
                if (data.transcription) {
                    addMessage(data.transcription, 'user');
                }

                // Show response
                loadingMsg.textContent = data.response || 'No response';
                statusEl.textContent = 'Ready';
            } catch (err) {
                loadingMsg.textContent = `Error: ${err.message}`;
                statusEl.textContent = 'Error - try again';
            }
        }

        // Touch events for mobile
        recordBtn.addEventListener('touchstart', (e) => {
            e.preventDefault();
            startRecording();
        });
        recordBtn.addEventListener('touchend', (e) => {
            e.preventDefault();
            stopRecording();
        });

        // Mouse events for desktop
        recordBtn.addEventListener('mousedown', startRecording);
        recordBtn.addEventListener('mouseup', stopRecording);
        recordBtn.addEventListener('mouseleave', stopRecording);

        // Register service worker for PWA
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js').catch(() => {});
        }
    </script>
</body>
</html>
